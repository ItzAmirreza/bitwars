name: CI

# PR gate: build + lint only. Uses no secrets, so it is safe to run on fork PRs.
on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lints and builds the TypeScript/React client (tsc + Vite) with bun.
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Non-blocking for now: the existing codebase has a backlog of eslint
      # findings (mostly no-explicit-any in the large Engine.ts). Lint still
      # runs and is visible in the logs; once the backlog is cleared (see
      # docs/REFACTORING.md) this should be made blocking again.
      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Build
        run: bun run build

      - name: Typecheck bots
        run: bun run bots:typecheck

  # Builds the Rust SpacetimeDB module for the wasm32 target (no publish, no database access).
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/spacetimedb
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server/spacetimedb

      - name: Build server WASM
        run: cargo build --target wasm32-unknown-unknown --release
