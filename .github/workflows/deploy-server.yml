name: Deploy Server

on:
  # Production publish is MANUAL ONLY. Auto-publishing on every push to master
  # was a production-wipe hazard: this job runs `spacetime publish ...
  # --clear-database`, so merging a contributor's server PR would have reset
  # the live database. Trigger it deliberately from the Actions tab instead.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/spacetimedb/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/spacetimedb/Cargo.lock', 'server/spacetimedb/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build server WASM
        working-directory: server/spacetimedb
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install SpacetimeDB CLI
        run: |
          curl -sSf https://install.spacetimedb.com | sh -s -- -y
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Authenticate
        run: spacetime login --token "${{ secrets.SPACETIMEDB_TOKEN }}"

      - name: Publish to SpacetimeDB
        working-directory: server
        run: spacetime publish bitwars --server maincloud --no-config --clear-database -y --module-path ./spacetimedb

      - name: Write deployed server build manifest
        run: |
          cat <<EOF > client/public/bitwars-server-build.json
          {
            "serverBuild": "${GITHUB_SHA::7}",
            "updatedAt": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Regenerate client bindings
        working-directory: server
        run: spacetime generate --no-config --lang typescript --out-dir ../client/src/module_bindings --module-path ./spacetimedb

      - name: Check for deploy artifact changes
        id: deploy_artifacts
        run: |
          if git diff --quiet client/src/module_bindings/ client/public/bitwars-server-build.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated deploy artifacts
        if: steps.deploy_artifacts.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/src/module_bindings/ client/public/bitwars-server-build.json
          git commit -m "chore: update deployed server artifacts"
          git push origin HEAD:master
