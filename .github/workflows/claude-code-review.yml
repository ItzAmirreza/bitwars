name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow Claude to commit/push fixes during review
      pull-requests: write # Allow Claude to post review comments
      issues: write # Allow Claude to comment on linked issues
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Run on Claude Opus 4.8 at xhigh reasoning effort.
          #
          # --allowedTools grants the full tool set so the reviewer can actually
          # run cargo/bun/git to verify builds instead of guessing. Listing
          # `Bash` bare allows ALL shell commands; WebFetch/WebSearch add web access.
          claude_args: |
            --model claude-opus-4-8
            --effort xhigh
            --allowedTools Bash,Edit,MultiEdit,Write,Read,Glob,Grep,LS,WebFetch,WebSearch,TodoWrite,NotebookEdit,Task

