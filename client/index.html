<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitWars.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Chakra+Petch:wght@400;600;700&family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script async src="https://jam.pieter.com/2026/widget.js"></script>
    <script>
      (() => {
        const WIDGET_URL = "https://vibej.am";
        const MENU_SELECTOR = "#root .absolute.inset-0.z-10";

        function getWidget() {
          return Array.from(document.querySelectorAll("a")).find((anchor) => (
            anchor.href.replace(/\/$/, "") === WIDGET_URL &&
            anchor.textContent?.includes("Vibe Jam 2026")
          )) ?? null;
        }

        function inMainMenu() {
          return document.querySelector(MENU_SELECTOR) !== null;
        }

        function syncWidgetVisibility() {
          const widget = getWidget();
          if (!widget) return;
          widget.style.display = inMainMenu() ? "" : "none";
        }

        const observer = new MutationObserver(() => {
          syncWidgetVisibility();
        });

        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
        });

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", syncWidgetVisibility, {
            once: true,
          });
        } else {
          syncWidgetVisibility();
        }

        window.addEventListener("load", syncWidgetVisibility, { once: true });
        window.setTimeout(syncWidgetVisibility, 250);
        window.setTimeout(syncWidgetVisibility, 1000);
      })();
    </script>
  </body>
</html>
